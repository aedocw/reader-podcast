% rebase('base', title='Preview Article', page='add', key=key)
<style>
  .preview-text { background: #f5f5f5; border: 1px solid #ddd; padding: 15px; margin: 20px 0; max-height: 400px; overflow-y: auto; line-height: 1.6; }
  .preview-text p { margin: 0 0 10px 0; }
  .preview-actions { margin: 20px 0; }
  .preview-actions input[type="submit"] { padding: 8px 20px; font-size: 14px; cursor: pointer; margin-right: 10px; }
  .approve { background: #4caf50; color: white; border: 1px solid #388e3c; }
  .reject { background: #f5f5f5; color: #333; border: 1px solid #ccc; }
</style>
<h1>Preview Article</h1>
<h2>{{title}}</h2>
<p><small>{{url}}</small></p>
<div class="preview-text">
% for para in paragraphs:
  <p>{{para}}</p>
% end
</div>
<div class="preview-actions">
  <form method="post" action="/add/confirm?key={{key}}" style="display:inline">
    <input type="hidden" name="url" value="{{url}}">
    <input type="hidden" name="voice" value="{{voice}}">
    <input type="hidden" name="title" value="{{title}}">
    <input type="submit" value="Approve" class="approve">
  </form>
  <form method="get" action="/add" style="display:inline">
    <input type="hidden" name="key" value="{{key}}">
    <input type="submit" value="Reject" class="reject">
  </form>
</div>
