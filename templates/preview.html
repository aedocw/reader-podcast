% rebase('base', title='Preview Article', page='add', key=key)
<style>
  .preview-text { width: 100%; box-sizing: border-box; min-height: 400px; padding: 15px; margin: 20px 0; font-family: inherit; font-size: 14px; line-height: 1.6; border: 1px solid #ddd; background: #f5f5f5; resize: vertical; }
  .preview-actions { margin: 20px 0; }
  .preview-actions input[type="submit"] { padding: 8px 20px; font-size: 14px; cursor: pointer; margin-right: 10px; }
  .approve { background: #4caf50; color: white; border: 1px solid #388e3c; }
  .reject { background: #f5f5f5; color: #333; border: 1px solid #ccc; }
</style>
<h1>Preview Article</h1>
<h2>{{title}}</h2>
<p><small>{{url}}</small></p>
<form method="post" action="/add/confirm?key={{key}}">
  <input type="hidden" name="url" value="{{url}}">
  <input type="hidden" name="voice" value="{{voice}}">
  <input type="hidden" name="title" value="{{title}}">
  <textarea name="body_text" class="preview-text">{{body_text}}</textarea>
  <div class="preview-actions">
    <input type="submit" value="Approve" class="approve">
    <a href="/add?key={{key}}"><input type="button" value="Reject" class="reject"></a>
  </div>
</form>
